[alembic]
# Вказуємо правильний шлях до папки міграцій
script_location = src/alembic

prepend_sys_path = .
version_path_separator = os

# sqlalchemy.url залишаємо порожнім або закоментованим
# URL буде підтягуватись динамічно через Pydantic Settings
# sqlalchemy.url = driver://user:pass@localhost/dbname

[post_write_hooks]
# Ми можемо підключити ruff для форматування міграцій
hooks = ruff
ruff.type = exec
ruff.executable = ruff
ruff.options = format

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S