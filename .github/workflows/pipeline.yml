name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres_password
          POSTGRES_DB: ai_email_db
        ports:
          - 5434:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6381:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: curl -sSL https://install.python-poetry.org | python3 -

      - name: Install dependencies
        run: poetry install --no-interaction --no-root

      - name: Run Linters (Ruff)
        run: poetry run ruff check src/

      - name: Run Type Checker (Pyright)
        run: poetry run pyright src/

      - name: Security Audit (pip-audit)
        run: |
          pip install pip-audit poetry-plugin-export
          poetry export -f requirements.txt --output requirements.txt --without-hashes
          pip-audit -r requirements.txt

      - name: Run DB Migrations
        run: poetry run alembic upgrade head

      - name: Run Tests with Coverage
        run: poetry run pytest --cov=src --cov-report=xml --cov-fail-under=59