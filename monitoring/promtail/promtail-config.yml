server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker_containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Забираємо тільки контейнери з проєкту g-mind (вбереже від логів інших ботів на VPS)
      - source_labels: ['__meta_docker_container_label_com_docker_compose_project']
        regex: '(g-mind|g_mind)'
        action: keep
      # Робимо ім'я сервісу з docker-compose лейблом
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: 'service'
    pipeline_stages:
      - docker: {}
      - json:
          expressions:
            level: level
      # Індексуємо ТІЛЬКИ рівень логу (INFO, ERROR) та сервіс. Жодних UUID!
      - labels:
          level: