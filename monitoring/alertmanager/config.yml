global:
  resolve_timeout: 5m
  # Заміни ці змінні на реальні перед деплоєм
  slack_api_url: '${SLACK_WEBHOOK_URL}'
  smtp_smarthost: 'smtp.gmail.com:587'
  smtp_from: 'alertmanager@yourdomain.com'
  smtp_auth_username: 'alertmanager@yourdomain.com'
  smtp_auth_password: '${SMTP_PASSWORD}'

route:
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  # Дефолтний ресівер
  receiver: 'slack-warning'
  
  routes:
    - matchers:
        - severity="critical"
      receiver: 'slack-critical'
    - matchers:
        - severity="warning"
      receiver: 'slack-warning'

inhibit_rules:
  - source_matchers:
      - severity="critical"
    target_matchers:
      - severity="warning"
    equal: ['alertname']

receivers:
  - name: 'slack-critical'
    slack_configs:
      - channel: '#oncall'
        send_resolved: true
        title: '[CRITICAL] {{ .GroupLabels.alertname }}'
        text: "{{ range .Alerts }}*Description:* {{ .Annotations.description }}\n{{ end }}"
    email_configs:
      - to: 'admin@yourdomain.com'
        send_resolved: true

  - name: 'slack-warning'
    slack_configs:
      - channel: '#email-assistant-alerts'
        send_resolved: true
        title: '[WARNING] {{ .GroupLabels.alertname }}'
        text: "{{ range .Alerts }}*Description:* {{ .Annotations.description }}\n{{ end }}"