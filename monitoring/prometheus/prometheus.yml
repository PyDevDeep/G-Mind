rule_files:
  - "/etc/prometheus/alerts.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - "alertmanager:9093"
global:
  scrape_interval: 15s
  evaluation_interval: 15s
            
scrape_configs:
  - job_name: 'fastapi'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['api:8000']

  - job_name: 'celery'
    static_configs:
      - targets: ['celery-exporter:9808']

  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
      
  - job_name: 'celery-custom-metrics'
    static_configs:
      - targets: ['celery-worker:8001']    

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']